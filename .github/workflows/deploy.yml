name: Deploy Admin Portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: admin-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app directory
        id: app
        shell: bash
        run: |
          if [ -f admin/package.json ]; then
            echo "dir=admin" >> "$GITHUB_OUTPUT"
            echo "lock=admin/package-lock.json" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "lock=package-lock.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ steps.app.outputs.lock }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: ${{ steps.app.outputs.dir }}
        run: npm ci

      - name: Build admin portal
        working-directory: ${{ steps.app.outputs.dir }}
        run: npm run build
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL || 'https://shiny-ferret-569.convex.cloud' }}
          VITE_CONVEX_SITE_URL: ${{ secrets.VITE_CONVEX_SITE_URL || 'https://shiny-ferret-569.convex.site' }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.app.outputs.dir }}/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
